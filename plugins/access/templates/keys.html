{{ define "keys.html" }}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SSH Keys</title>
  {{ template "head-assets" . }}
</head>
<body>
  {{ template "header" . }}
  <main class="page">
<section class="panel">
  <h2>Add SSH Key</h2>
  <form method="post" action="/keys" class="stack">
    <label>Name <input type="text" name="name" placeholder="operator-laptop"></label>
    <label>Public key <textarea name="public_key" rows="4" placeholder="ssh-ed25519 AAAA... comment"></textarea></label>
    <button type="submit">Store key</button>
  </form>
</section>

<section class="panel">
  <h2>Registered Keys</h2>
  <table>
    <thead>
      <tr><th>Name</th><th>Fingerprint</th><th>Created</th></tr>
    </thead>
    <tbody>
      {{ range .Keys }}
      <tr>
        <td>{{ .Name }}</td>
        <td><code>{{ .Fingerprint }}</code></td>
        <td>{{ formatTime .CreatedAt }}</td>
      </tr>
      {{ else }}
      <tr><td colspan="3">No keys registered yet.</td></tr>
      {{ end }}
    </tbody>
  </table>
</section>
  </main>
</body>
</html>
{{ end }}
