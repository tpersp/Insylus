{{ define "install.html" }}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Install Agent</title>
  {{ template "head-assets" . }}
</head>
<body>
  {{ template "header" . }}
  <main class="page">
    <div class="page-nav">
      <a href="/devices/{{ .Target.ID }}" class="button-secondary">← Back to {{ .Target.Name }}</a>
    </div>
<section class="panel">
  <h2>Install Agent on {{ .Target.Name }}</h2>
  <p>Run this on the target Linux host as a sudo-capable user.</p>
  <pre><code>{{ .Command }}</code></pre>
  <p>Bootstrap token: <code>{{ .Target.ID }}</code></p>
</section>
  </main>
</body>
</html>
{{ end }}
